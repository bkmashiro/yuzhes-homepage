<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yuzhes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Scene: wide shot, zoom-in trigger -->
  <div id="scene-wide" class="scene active">
    <img id="wide-img" src="assets/wide.png" alt="desk scene" />
    <div id="zoom-hint">click to enter</div>
  </div>

  <!-- Scene: closeup with screen overlay -->
  <div id="scene-closeup" class="scene">
    <img id="closeup-img" src="assets/closeup.png" alt="CRT monitor" />

    <!-- Screen content — transformed via matrix3d to match CRT screen corners -->
    <div id="screen-content">
      <div id="win98-desktop">
        <div id="desktop-icons">
          <!-- icons injected by win98.js -->
        </div>
        <div id="taskbar">
          <button id="start-btn">
            <img id="start-logo" alt="" />
            Start
          </button>
          <div id="start-menu"></div>
          <div id="system-tray">
            <button id="tray-volume" title="Volume" style="background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="2,5 6,5 10,2 10,14 6,11 2,11" fill="#333"/>
                <path d="M11.5 5.5 Q14 8 11.5 10.5" stroke="#333" stroke-width="1.5" fill="none"/>
                <path d="M12.5 3.5 Q16 8 12.5 12.5" stroke="#333" stroke-width="1.2" fill="none"/>
              </svg>
            </button>
            <button id="tray-network" title="Network" style="background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="9" width="5" height="4" rx="0.5" fill="#333"/>
                <rect x="10" y="9" width="5" height="4" rx="0.5" fill="#333"/>
                <rect x="5.5" y="3" width="5" height="4" rx="0.5" fill="#333"/>
                <line x1="8" y1="7" x2="8" y2="9" stroke="#333" stroke-width="1"/>
                <line x1="3.5" y1="9" x2="8" y2="7" stroke="#333" stroke-width="1"/>
                <line x1="12.5" y1="9" x2="8" y2="7" stroke="#333" stroke-width="1"/>
              </svg>
            </button>
          </div>
          <div id="taskbar-clock"></div>
        </div>
      </div>

      <!-- CRT overlay effects — inside screen-content so matrix3d + clip-path apply -->
      <div id="crt-effects"></div>
    </div>

    <!-- Character sprite -->
    <img id="character" src="assets/anime-girl.png" alt="character" />
    <div id="speech-bubble"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
