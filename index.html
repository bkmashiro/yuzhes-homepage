<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yuzhes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Scene: wide shot, zoom-in trigger -->
  <div id="scene-wide" class="scene active">
    <img id="wide-img" src="assets/wide.png" alt="desk scene" />
    <div id="zoom-hint">click to enter</div>
  </div>

  <!-- Scene: closeup with screen overlay -->
  <div id="scene-closeup" class="scene">
    <img id="closeup-img" src="assets/closeup.png" alt="CRT monitor" />

    <!-- Screen content div — will be transformed via matrix3d to match screen corners -->
    <div id="screen-content">
      <!-- Win98-style desktop goes here -->
      <div id="win98-desktop">
        <div id="desktop-icons">
          <!-- icons injected by JS -->
        </div>
        <div id="taskbar">
          <button id="start-btn">
            <img id="start-logo" alt="" />
            Start
          </button>
          <div id="start-menu"></div>
          <div id="taskbar-clock"></div>
        </div>
      </div>
    </div>

    <!-- CRT overlay effects -->
    <div id="crt-overlay"></div>

    <!-- Character sprite -->
    <img id="character" src="assets/anime-girl.png" alt="character" />
    <div id="speech-bubble"></div>
  </div>

  <script src="homography.js"></script>
  <script src="warp.js"></script>
  <script src="win98.js"></script>
  <script src="main.js"></script>
</body>
</html>
